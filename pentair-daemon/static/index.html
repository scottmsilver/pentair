<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pool</title>
<style>
:root {
  --bg: #0a1628;
  --card: rgba(255,255,255,0.06);
  --card-border: rgba(255,255,255,0.08);
  --accent: #38bdf8;
  --teal: #2dd4bf;
  --warm: #f97316;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-faint: rgba(255,255,255,0.35);
  --text-bright: #f8fafc;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100%;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
  display: flex; justify-content: center;
}
.app {
  width: 100%; max-width: 420px;
  padding: 0 16px env(safe-area-inset-bottom);
}

/* ── Header ─────────────────────────────── */
.hdr {
  display: flex; justify-content: center; align-items: center;
  padding: 16px 0 12px;
  position: relative;
}
.hdr-btns {
  position: absolute; right: 0;
  display: flex; gap: 4px; align-items: center;
}
.conn {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 500; color: var(--text-dim);
  background: rgba(255,255,255,0.06);
  padding: 5px 12px; border-radius: 20px;
}
.conn-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #22c55e;
}
.conn-dot.off { background: #ef4444; }
.gear-btn, .goodnight-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.06); border: none; cursor: pointer;
  color: var(--text-dim); font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.2s;
}
.gear-btn:active, .goodnight-btn:active { color: var(--text-bright); }
.goodnight-btn { display: none; }
.goodnight-btn.visible { display: flex; }

/* ── Cards ──────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 12px;
}
.card-hdr {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 4px;
}
.card-title {
  font-size: 17px; font-weight: 600; color: var(--text-bright);
}
.card-status {
  font-size: 13px; font-weight: 500; color: var(--text-dim);
}
.card-status.on { color: var(--teal); }
.card-status.heating { color: var(--warm); }

/* ── Heat estimate ──────────────────────── */
.heat-info {
  font-size: 13px; color: var(--warm); font-weight: 500;
  margin-top: 4px; margin-bottom: 4px;
  display: none;
}
.heat-info.visible { display: block; }
.heat-progress {
  height: 3px; border-radius: 2px;
  background: rgba(255,255,255,0.06);
  margin-top: 6px; overflow: hidden;
  display: none;
}
.heat-progress.visible { display: block; }
.heat-progress-bar {
  height: 100%; border-radius: 2px;
  background: var(--warm);
  transition: width 1s ease;
}

/* ── Temperature display ────────────────── */
.temp-row {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 2px;
}
.temp-val {
  font-size: 52px; font-weight: 700; color: var(--text-bright);
  letter-spacing: -2px; line-height: 1.1;
}
.temp-deg { font-weight: 400; opacity: 0.5; }
.temp-age {
  font-size: 13px; color: var(--text-dim);
}

/* ── Setpoint row ───────────────────────── */
.setpoint-row {
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 12px 16px;
  margin-top: 12px;
  cursor: pointer;
  transition: background 0.2s;
}
.setpoint-row:active { background: rgba(255,255,255,0.08); }
.setpoint-label { font-size: 15px; color: var(--text-dim); }
.setpoint-val {
  display: flex; align-items: center; gap: 6px;
  font-size: 15px; font-weight: 600; color: var(--text-bright);
}
.setpoint-arrow { color: var(--text-dim); font-size: 14px; }

/* ── Segmented control ──────────────────── */
.seg-ctrl {
  display: flex; gap: 8px;
  margin-top: 12px; margin-bottom: 4px;
}
.seg-btn {
  padding: 9px 22px; border-radius: 22px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  color: var(--text-dim);
  font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.seg-btn:active { transform: scale(0.95); }
.seg-btn.active {
  background: rgba(20, 184, 166, 0.18);
  border-color: rgba(20, 184, 166, 0.35);
  color: var(--teal);
}

/* ── Lights section ─────────────────────── */
.lights-hdr {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.lights-title { font-size: 17px; font-weight: 600; color: var(--text-bright); }
.lights-status { font-size: 13px; font-weight: 500; color: var(--text-dim); }
.lights-status.on { color: var(--teal); }

.lights-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  justify-items: center;
}
.cswatch {
  width: 100%; aspect-ratio: 1; max-width: 54px; border-radius: 50%;
  border: 3px solid transparent; cursor: pointer;
  transition: transform 0.2s, border-color 0.3s;
}
.cswatch:active { transform: scale(0.9); }
.cswatch.on {
  border-color: white;
  box-shadow: 0 0 12px rgba(255,255,255,0.3);
}
.cswatch.off-swatch {
  background: rgba(255,255,255,0.06);
  border: 3px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: rgba(255,255,255,0.45);
}
.cswatch[data-mode="swim"]      { background: linear-gradient(135deg, #0ea5e9, #14b8a6); }
.cswatch[data-mode="party"]     { background: conic-gradient(#ef4444, #eab308, #22c55e, #3b82f6, #a855f7, #ef4444); }
.cswatch[data-mode="romantic"]  { background: linear-gradient(135deg, #ec4899, #f59e0b); }
.cswatch[data-mode="caribbean"] { background: linear-gradient(135deg, #06b6d4, #2dd4bf); }
.cswatch[data-mode="american"]  { background: linear-gradient(135deg, #ef4444, #eff6ff, #3b82f6); }
.cswatch[data-mode="sunset"]    { background: linear-gradient(135deg, #f97316, #dc2626); }
.cswatch[data-mode="royal"]     { background: linear-gradient(135deg, #7c3aed, #3b82f6); }
.cswatch[data-mode="blue"]      { background: #3b82f6; }
.cswatch[data-mode="green"]     { background: #22c55e; }
.cswatch[data-mode="red"]       { background: #ef4444; }
.cswatch[data-mode="white"]     { background: radial-gradient(circle, #ffffff, #cbd5e1); }
.cswatch[data-mode="purple"]    { background: #a855f7; }

/* ── Auxiliaries ─────────────────────────── */
.auxs {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 12px;
}
.aux {
  flex: 1; min-width: 80px;
  padding: 14px 8px; border-radius: 16px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
  color: var(--text-dim); font-size: 13px; font-weight: 500;
  cursor: pointer; text-align: center; transition: all 0.3s;
}
.aux:active { transform: scale(0.96); }
.aux.on { background: rgba(56,189,248,0.12); border-color: rgba(56,189,248,0.3); color: var(--accent); }

/* ── Tech drawer ────────────────────────── */
.tech-drawer {
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s;
  padding: 0;
}
.tech-drawer.open { max-height: 600px; padding: 12px 0; }
.tech-row {
  display: flex; justify-content: space-between;
  font-size: 13px; color: var(--text-dim);
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.tech-row:last-child { border-bottom: none; }
.tech-label { color: rgba(255,255,255,0.35); }
.tech-val { font-weight: 600; }

/* ── Matter Bridge section ───────────── */
.matter-section {
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.matter-title {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 10px;
}
.matter-body { display: flex; align-items: flex-start; gap: 14px; }
.matter-qr {
  width: 120px; height: 120px; border-radius: 8px;
  background: white; padding: 4px; flex-shrink: 0;
}
.matter-qr img { width: 100%; height: 100%; image-rendering: pixelated; }
.matter-info { font-size: 12px; color: var(--text-dim); flex: 1; }
.matter-info .matter-label-txt { color: rgba(255,255,255,0.35); margin-bottom: 2px; }
.matter-info .matter-val {
  font-family: 'SF Mono', 'Menlo', monospace; font-weight: 600;
  color: var(--text); margin-bottom: 8px; word-break: break-all;
}
.matter-hint { font-size: 11px; color: var(--text-faint); line-height: 1.4; margin-top: 4px; }

/* ── Bottom sheet ────────────────────────── */
.ov {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  z-index: 100; align-items: flex-end; justify-content: center;
}
.ov.open { display: flex; }
.sh {
  background: #1e293b; width: 100%; max-width: 420px;
  border-radius: 24px 24px 0 0;
  padding: 8px 24px calc(20px + env(safe-area-inset-bottom));
  text-align: center;
}
.sh-bar { width: 36px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.2); margin: 0 auto 20px; }
.sh h3 { font-size: 16px; font-weight: 600; color: var(--text-bright); margin-bottom: 20px; }
.sh .sv { font-size: 68px; font-weight: 700; color: var(--text-bright); letter-spacing: -3px; line-height: 1; }
.sh .su { font-size: 26px; color: var(--text-dim); font-weight: 400; }
.sh .sbtns { display: flex; justify-content: center; gap: 28px; margin: 20px 0 24px; }
.sh .sb {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  color: var(--text-bright); font-size: 26px; font-weight: 300;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.sh .sb:active { transform: scale(0.9); background: rgba(255,255,255,0.15); }
.sh .sas { display: flex; gap: 10px; }
.sh .sa { flex: 1; padding: 15px; border-radius: 14px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
.sh .sa:active { transform: scale(0.97); }
.sh .sa-c { background: rgba(255,255,255,0.08); color: var(--text); }
.sh .sa-s { background: var(--accent); color: #0f172a; }
</style>
</head>
<body>

<div class="app">
  <div class="hdr">
    <div class="conn">
      <div class="conn-dot" id="connDot"></div>
      <span id="connText">Connecting</span>
    </div>
    <div class="hdr-btns">
      <button class="goodnight-btn" id="goodnightBtn" onclick="doGoodnight()">🌙</button>
      <button class="gear-btn" onclick="document.getElementById('techDraw').classList.toggle('open')">⚙️</button>
    </div>
  </div>

  <!-- Pool card -->
  <div class="card" id="poolCard">
    <div class="card-hdr">
      <span class="card-title">Pool</span>
      <span class="card-status" id="poolStatus">Off</span>
    </div>
    <div class="temp-row">
      <span class="temp-val" id="pT">--<span class="temp-deg">°</span></span>
      <span class="temp-age" id="pAge"></span>
    </div>
    <div class="heat-info" id="pHeat"></div>
    <div class="heat-progress" id="pProgress"><div class="heat-progress-bar" id="pProgressBar"></div></div>
    <div class="setpoint-row" onclick="openSet('pool')">
      <span class="setpoint-label">Setpoint</span>
      <span class="setpoint-val"><span id="pS">--°F</span> <span class="setpoint-arrow">›</span></span>
    </div>
  </div>

  <!-- Spa card -->
  <div class="card" id="spaCard">
    <div class="card-hdr">
      <span class="card-title">Spa</span>
      <span class="card-status" id="spaStatus">Off</span>
    </div>
    <div class="temp-row">
      <span class="temp-val" id="sT">--<span class="temp-deg">°</span></span>
      <span class="temp-age" id="sAge"></span>
    </div>
    <div class="heat-info" id="sHeat"></div>
    <div class="heat-progress" id="sProgress"><div class="heat-progress-bar" id="sProgressBar"></div></div>
    <div class="seg-ctrl" id="spaSeg">
      <button class="seg-btn" data-state="off" onclick="setSpaState('off')">Off</button>
      <button class="seg-btn" data-state="spa" onclick="setSpaState('spa')">Spa</button>
      <button class="seg-btn" data-state="jets" onclick="setSpaState('jets')">Jets</button>
    </div>
    <div class="setpoint-row" onclick="openSet('spa')">
      <span class="setpoint-label">Setpoint</span>
      <span class="setpoint-val"><span id="sS">--°F</span> <span class="setpoint-arrow">›</span></span>
    </div>
  </div>

  <!-- Lights card -->
  <div class="card" id="lightsCard">
    <div class="lights-hdr">
      <span class="lights-title">Lights</span>
      <span class="lights-status" id="lightsStatus">Off</span>
    </div>
    <div class="lights-grid" id="lightsGrid"></div>
  </div>

  <!-- Tech drawer -->
  <div class="tech-drawer" id="techDraw">
    <div class="auxs" id="axs"></div>
    <div class="tech-row"><span class="tech-label">Equipment Pad</span><span class="tech-val" id="tdAir">--</span></div>
    <div class="tech-row"><span class="tech-label">Controller</span><span class="tech-val" id="tdCtrl">--</span></div>
    <div class="tech-row"><span class="tech-label">Firmware</span><span class="tech-val" id="tdFw">--</span></div>
    <div class="tech-row"><span class="tech-label">Pump</span><span class="tech-val" id="tdPump">--</span></div>
    <div class="tech-row"><span class="tech-label">RPM</span><span class="tech-val" id="tdRpm">—</span></div>
    <div class="tech-row"><span class="tech-label">Power</span><span class="tech-val" id="tdW">—</span></div>
    <div class="tech-row"><span class="tech-label">Flow</span><span class="tech-val" id="tdGpm">—</span></div>
    <div class="matter-section" id="matterSection" style="display:none">
      <div class="matter-title">Matter Bridge</div>
      <div class="matter-body">
        <div class="matter-qr"><img id="matterQr" src="/api/matter/qr" alt="Matter QR Code"></div>
        <div class="matter-info">
          <div class="matter-label-txt">Manual code</div>
          <div class="matter-val" id="matterCode">--</div>
          <div class="matter-hint">Scan with Google Home app to commission this pool as a Matter device.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Setpoint bottom sheet -->
<div class="ov" id="ov" onclick="if(event.target===this)closeSet()">
  <div class="sh">
    <div class="sh-bar"></div>
    <h3 id="shT">Temperature</h3>
    <div><span class="sv" id="shV">--</span><span class="su">°</span></div>
    <div class="sbtns">
      <button class="sb" onclick="adj(-1)">−</button>
      <button class="sb" onclick="adj(+1)">+</button>
    </div>
    <div class="sas">
      <button class="sa sa-c" onclick="closeSet()">Cancel</button>
      <button class="sa sa-s" onclick="confirmSet()">Set</button>
    </div>
  </div>
</div>

<script>
const MODES = ['swim','party','romantic','caribbean','american','sunset','royal','blue','green','red','white','purple'];
let S = null, setB = null, setV = 0;

async function post(p, b) {
  const o = { method: 'POST' };
  if (b) { o.headers = { 'Content-Type': 'application/json' }; o.body = JSON.stringify(b); }
  return (await fetch(p, o)).json();
}

async function refresh() {
  try {
    S = await (await fetch('/api/pool')).json();
    render();
  } catch {
    document.getElementById('connDot').classList.add('off');
    document.getElementById('connText').textContent = 'Disconnected';
  }
}

function connectWs() {
  const w = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/api/ws');
  w.onmessage = () => refresh();
  w.onclose = () => setTimeout(connectWs, 3000);
}

function timeAgo(unixMs) {
  if (!unixMs) return '';
  const sec = Math.floor((Date.now() - unixMs) / 1000);
  if (sec < 60) return 'just now';
  if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
  if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
  if (sec < 172800) return 'yesterday';
  return Math.floor(sec / 86400) + 'd ago';
}

function renderHeatEstimate(prefix, body) {
  const info = document.getElementById(prefix + 'Heat');
  const progress = document.getElementById(prefix + 'Progress');
  const bar = document.getElementById(prefix + 'ProgressBar');
  const hed = body.heat_estimate_display;
  const hp = body.spa_heat_progress;

  // Use the display contract: state is ready|pending|unavailable
  if (hed && hed.state !== 'unavailable' && body.on) {
    let text = '';
    if (hed.state === 'ready' && hed.minutes_remaining != null) {
      text = 'Ready in about ' + hed.minutes_remaining + ' min';
    } else if (hed.state === 'pending' && hed.reason === 'sensor-warmup') {
      if (hed.available_in_seconds != null) {
        text = 'Warming sensor... ' + Math.ceil(hed.available_in_seconds / 60) + 'm';
      } else {
        text = 'Warming sensor...';
      }
    } else if (hed.state === 'pending') {
      text = 'Estimating...';
    }
    if (text) { info.textContent = text; info.classList.add('visible'); }
    else { info.classList.remove('visible'); }
  } else {
    info.classList.remove('visible');
  }

  if (hp && hp.active && hp.progress_pct > 0) {
    bar.style.width = hp.progress_pct + '%';
    progress.classList.add('visible');
  } else {
    progress.classList.remove('visible');
  }
}

function render() {
  if (!S) return;

  document.getElementById('connDot').classList.remove('off');
  document.getElementById('connText').textContent = 'Connected';

  // Pool
  if (S.pool) {
    const pTd = S.pool.temperature_display;
    const pTemp = pTd ? pTd.value : S.pool.temperature;
    document.getElementById('pT').innerHTML = pTemp + '<span class="temp-deg">°</span>';
    document.getElementById('pS').textContent = S.pool.setpoint + '°F';
    const poolStatus = document.getElementById('poolStatus');
    if (S.pool.on && S.pool.heating !== 'off') {
      poolStatus.textContent = 'Heating';
      poolStatus.className = 'card-status heating';
    } else if (S.pool.on) {
      poolStatus.textContent = 'On';
      poolStatus.className = 'card-status on';
    } else {
      poolStatus.textContent = 'Off';
      poolStatus.className = 'card-status';
    }
    document.getElementById('pAge').textContent = (pTd && pTd.last_reliable_at_unix_ms) ? timeAgo(pTd.last_reliable_at_unix_ms) : '';
    renderHeatEstimate('p', S.pool);
  }

  // Spa
  if (S.spa) {
    const sTd = S.spa.temperature_display;
    const sTemp = sTd ? sTd.value : S.spa.temperature;
    document.getElementById('sT').innerHTML = sTemp + '<span class="temp-deg">°</span>';
    document.getElementById('sS').textContent = S.spa.setpoint + '°F';
    const spaStatus = document.getElementById('spaStatus');
    if (S.spa.on && S.spa.heating !== 'off') {
      spaStatus.textContent = 'Heating';
      spaStatus.className = 'card-status heating';
    } else if (S.spa.on) {
      spaStatus.textContent = 'On';
      spaStatus.className = 'card-status on';
    } else {
      spaStatus.textContent = 'Off';
      spaStatus.className = 'card-status';
    }
    document.getElementById('sAge').textContent = (sTd && sTd.last_reliable_at_unix_ms) ? timeAgo(sTd.last_reliable_at_unix_ms) : '';
    renderHeatEstimate('s', S.spa);
    // Segmented control
    const hasJets = S.spa.accessories && S.spa.accessories.jets !== undefined;
    let spaState = 'off';
    if (S.spa.on && hasJets && S.spa.accessories.jets) spaState = 'jets';
    else if (S.spa.on) spaState = 'spa';
    document.querySelectorAll('#spaSeg .seg-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.state === spaState);
    });
  }

  // Lights
  if (S.lights) {
    const grid = document.getElementById('lightsGrid');
    const status = document.getElementById('lightsStatus');
    if (S.lights.on && S.lights.mode) {
      status.textContent = S.lights.mode.charAt(0).toUpperCase() + S.lights.mode.slice(1);
      status.className = 'lights-status on';
    } else {
      status.textContent = 'Off';
      status.className = 'lights-status';
    }
    if (!grid.children.length) {
      const off = document.createElement('div');
      off.className = 'cswatch off-swatch';
      off.textContent = '⏻';
      off.onclick = () => setMode('off');
      grid.appendChild(off);
      MODES.forEach(m => {
        const d = document.createElement('div');
        d.className = 'cswatch'; d.dataset.mode = m;
        d.onclick = () => setMode(m);
        grid.appendChild(d);
      });
    }
    grid.querySelectorAll('.cswatch[data-mode]').forEach(d => {
      d.classList.toggle('on', S.lights.on && d.dataset.mode === S.lights.mode);
    });
  }

  // Auxiliaries
  const ax = document.getElementById('axs');
  if (S.auxiliaries) {
    if (!ax.children.length) S.auxiliaries.forEach(a => {
      const b = document.createElement('button'); b.className = 'aux'; b.id = 'ax-' + a.id;
      b.textContent = a.name; b.onclick = () => toggleAux(a.id); ax.appendChild(b);
    });
    S.auxiliaries.forEach(a => {
      const b = document.getElementById('ax-' + a.id);
      if (b) b.classList.toggle('on', a.on);
    });
  }

  // Tech info
  if (S.system) {
    document.getElementById('tdAir').textContent = S.system.air_temperature + '°F';
    document.getElementById('tdCtrl').textContent = S.system.controller || '--';
    document.getElementById('tdFw').textContent = S.system.firmware || '--';
  }
  if (S.pump) {
    document.getElementById('tdPump').textContent = S.pump.pump_type + (S.pump.running ? ' (running)' : ' (off)');
    document.getElementById('tdRpm').textContent = S.pump.running ? S.pump.rpm + ' RPM' : '—';
    document.getElementById('tdW').textContent = S.pump.running ? S.pump.watts + 'W' : '—';
    document.getElementById('tdGpm').textContent = S.pump.running ? S.pump.gpm + ' GPM' : '—';
  }

  document.getElementById('goodnightBtn').classList.toggle('visible', !!S.goodnight_available);
}

async function doGoodnight() { await post('/api/goodnight'); }

async function setSpaState(state) {
  if (!S?.spa) return;
  if (state === 'off') {
    await post('/api/spa/off');
  } else if (state === 'spa') {
    if (!S.spa.on) await post('/api/spa/on');
    if (S.spa.accessories?.jets) await post('/api/spa/jets/off');
  } else if (state === 'jets') {
    if (!S.spa.on) await post('/api/spa/on');
    await post('/api/spa/jets/on');
  }
  setTimeout(refresh, 1500);
}

async function setMode(m) {
  if (m === 'off') { await post('/api/lights/off'); }
  else { await post('/api/lights/mode', { mode: m }); if (!S.lights.on) await post('/api/lights/on'); }
  setTimeout(refresh, 500);
}

async function toggleAux(id) {
  const a = S.auxiliaries.find(x => x.id === id);
  if (!a) return;
  await post('/api/auxiliary/' + id + '/' + (a.on ? 'off' : 'on'));
  setTimeout(refresh, 1000);
}

function openSet(b) {
  setB = b;
  const d = b === 'pool' ? S.pool : S.spa;
  if (!d) return;
  setV = d.setpoint;
  document.getElementById('shT').textContent = (b === 'pool' ? 'Pool' : 'Spa') + ' Temperature';
  document.getElementById('shV').textContent = setV;
  document.getElementById('ov').classList.add('open');
}
function closeSet() { document.getElementById('ov').classList.remove('open'); setB = null; }
function adj(d) { setV = Math.max(40, Math.min(104, setV + d)); document.getElementById('shV').textContent = setV; }
async function confirmSet() {
  if (!setB) return;
  await post('/api/' + setB + '/heat', { setpoint: setV });
  closeSet();
  setTimeout(refresh, 2000);
}

// ── Matter info ──
async function loadMatter() {
  try {
    const info = await (await fetch('/api/matter/info')).json();
    if (info.manual_code) {
      document.getElementById('matterCode').textContent = info.manual_code;
      document.getElementById('matterSection').style.display = '';
    }
  } catch {}
}
loadMatter();

refresh(); connectWs(); setInterval(refresh, 15000);
</script>
</body>
</html>
