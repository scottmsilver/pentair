<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Pool</title>
<style>
:root {
  --bg: #0a1628;
  --card: #111d33;
  --water-off: #1a2a44;
  --water-pool: #0c4a6e;
  --water-spa: #164e63;
  --accent: #38bdf8;
  --warm: #f97316;
  --text: #e2e8f0;
  --text-dim: #64748b;
  --text-bright: #f8fafc;
  --radius: 16px;
  --jets: #06b6d4;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding: 16px;
  -webkit-tap-highlight-color: transparent;
}

.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 4px 16px;
}
.header h1 { font-size: 20px; font-weight: 600; color: var(--text-bright); }
.header .air { font-size: 14px; color: var(--text-dim); }
.header .status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #22c55e; display: inline-block; margin-right: 6px;
}
.header .status-dot.disconnected { background: #ef4444; }

/* ── Pool shape ─────────────────────────────────────────── */
.pool-container {
  position: relative;
  width: 100%; aspect-ratio: 4 / 3;
  margin-bottom: 16px;
}

.spa-shape {
  position: absolute; top: 0; left: 0;
  width: 35%; height: 50%;
  background: var(--water-off);
  border-radius: var(--radius) 0 var(--radius) 0;
  cursor: pointer;
  transition: background 0.5s, box-shadow 0.5s;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 12px; z-index: 2;
  border: 2px solid rgba(255,255,255,0.06);
}
.spa-shape.active {
  background: var(--water-spa);
  box-shadow: 0 0 30px rgba(6, 182, 212, 0.2);
  border-color: rgba(6, 182, 212, 0.3);
}

.pool-shape {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--water-off);
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.5s, box-shadow 0.5s;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 12px; z-index: 1;
  border: 2px solid rgba(255,255,255,0.06);
}
.pool-shape.active {
  background: var(--water-pool);
  box-shadow: 0 0 40px rgba(14, 165, 233, 0.15);
  border-color: rgba(56, 189, 248, 0.3);
}

.body-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
  color: var(--text-dim); margin-bottom: 4px;
  cursor: pointer; user-select: none;
}
.body-label:active { opacity: 0.7; }
.power-icon {
  font-size: 14px; margin-left: 4px;
  opacity: 0.4; transition: opacity 0.3s, color 0.3s;
}
.active .power-icon { opacity: 1; color: var(--accent); }
.body-temp {
  font-size: 36px; font-weight: 700; color: var(--text-bright);
  line-height: 1;
}
.body-setpoint {
  font-size: 14px; color: var(--text-dim); margin-top: 4px;
  cursor: pointer;
}
.body-setpoint:hover { color: var(--accent); }
.heat-indicator {
  font-size: 16px; margin-top: 6px;
  opacity: 0; transition: opacity 0.3s;
}
.heat-indicator.active { opacity: 1; }

.jets-btn {
  margin-top: 8px; padding: 6px 16px;
  border-radius: 20px; border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: var(--text-dim); font-size: 12px;
  cursor: pointer; transition: all 0.3s;
  display: none;
}
.jets-btn.visible { display: inline-flex; align-items: center; gap: 4px; }
.jets-btn.active {
  background: rgba(6, 182, 212, 0.2);
  border-color: var(--jets); color: var(--jets);
}
.jets-btn .bubble { font-size: 14px; }

/* Pool content sits to the right of spa */
.pool-content {
  position: absolute;
  top: 50%; right: 12%;
  transform: translateY(-50%);
  text-align: center; z-index: 1;
}

/* Lights badge inside pool */
.lights-badge {
  position: absolute; bottom: 16px; left: 50%;
  transform: translateX(-50%);
  z-index: 3; cursor: pointer;
  padding: 8px 20px; border-radius: 24px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 13px; color: var(--text-dim);
  transition: all 0.3s; display: flex; align-items: center; gap: 8px;
}
.lights-badge.active {
  background: rgba(250, 204, 21, 0.15);
  border-color: rgba(250, 204, 21, 0.4);
  color: #fbbf24;
}
.lights-badge .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--text-dim); transition: background 0.3s;
}
.lights-badge.active .dot { background: #fbbf24; }

/* ── Light picker ───────────────────────────────────────── */
.light-picker {
  display: none; background: var(--card);
  border-radius: var(--radius); padding: 16px;
  margin-bottom: 16px;
  border: 1px solid rgba(255,255,255,0.06);
}
.light-picker.open { display: block; }
.light-picker h3 {
  font-size: 13px; color: var(--text-dim); margin-bottom: 12px;
  text-transform: uppercase; letter-spacing: 1px;
}
.light-modes {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
}
.light-mode-btn {
  padding: 10px 4px; border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text); font-size: 12px;
  cursor: pointer; transition: all 0.2s;
  text-align: center;
}
.light-mode-btn:active { transform: scale(0.95); }
.light-mode-btn.active {
  background: rgba(250, 204, 21, 0.15);
  border-color: rgba(250, 204, 21, 0.4);
  color: #fbbf24;
}

/* ── Auxiliaries ────────────────────────────────────────── */
.aux-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 8px;
}
.aux-btn {
  padding: 14px 8px; border-radius: 12px;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--text-dim); font-size: 13px;
  cursor: pointer; transition: all 0.3s;
  text-align: center;
}
.aux-btn.active {
  background: rgba(56, 189, 248, 0.1);
  border-color: rgba(56, 189, 248, 0.3);
  color: var(--accent);
}

/* ── Pump bar ───────────────────────────────────────────── */
.pump-bar {
  margin-top: 16px; padding: 10px 16px;
  background: var(--card); border-radius: 10px;
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--text-dim);
  border: 1px solid rgba(255,255,255,0.04);
}
.pump-bar .val { color: var(--text); font-weight: 500; }

/* ── Setpoint modal ─────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card); border-radius: 20px;
  padding: 24px; width: 280px; text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
}
.modal h3 { font-size: 16px; margin-bottom: 20px; color: var(--text-bright); }
.modal .temp-display { font-size: 48px; font-weight: 700; color: var(--text-bright); }
.modal .temp-unit { font-size: 20px; color: var(--text-dim); }
.modal .temp-controls { display: flex; justify-content: center; gap: 24px; margin: 20px 0; }
.modal .temp-btn {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--text-bright); font-size: 24px;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.modal .temp-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.15); }
.modal .modal-actions { display: flex; gap: 8px; }
.modal .modal-btn {
  flex: 1; padding: 12px; border-radius: 12px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.modal .modal-btn.cancel { background: rgba(255,255,255,0.08); color: var(--text); }
.modal .modal-btn.confirm { background: var(--accent); color: #0a1628; }
</style>
</head>
<body>

<div class="header">
  <h1><span class="status-dot" id="statusDot"></span>Pool</h1>
  <span class="air" id="airTemp"></span>
</div>

<div class="pool-container">
  <div class="pool-shape" id="poolShape">
    <div class="pool-content" id="poolContent">
      <div class="body-label" onclick="togglePool()">Pool <span class="power-icon" id="poolPower">⏻</span></div>
      <div class="body-temp" id="poolTemp">--°</div>
      <div class="body-setpoint" id="poolSet" onclick="openSetpoint('pool')">set --°</div>
      <div class="heat-indicator" id="poolHeat">🔥</div>
    </div>
  </div>

  <div class="spa-shape" id="spaShape">
    <div class="body-label" onclick="toggleSpa()">Spa <span class="power-icon" id="spaPower">⏻</span></div>
    <div class="body-temp" id="spaTemp">--°</div>
    <div class="body-setpoint" id="spaSet" onclick="openSetpoint('spa')">set --°</div>
    <div class="heat-indicator" id="spaHeat">🔥</div>
    <button class="jets-btn" id="jetsBtn" onclick="toggleJets()">
      <span class="bubble">💨</span> Jets
    </button>
  </div>

  <div class="lights-badge" id="lightsBadge" onclick="toggleLightPicker()">
    <span class="dot" id="lightDot"></span>
    <span id="lightsLabel">Lights</span>
  </div>
</div>

<div class="light-picker" id="lightPicker">
  <h3>Light Mode</h3>
  <div class="light-modes" id="lightModes"></div>
</div>

<div class="aux-row" id="auxRow"></div>

<div class="pump-bar" id="pumpBar">
  <span>Pump <span class="val" id="pumpType">--</span></span>
  <span><span class="val" id="pumpRpm">0</span> RPM</span>
  <span><span class="val" id="pumpWatts">0</span>W</span>
  <span><span class="val" id="pumpGpm">0</span> GPM</span>
</div>

<!-- Setpoint modal -->
<div class="modal-overlay" id="setpointModal">
  <div class="modal">
    <h3 id="modalTitle">Set Temperature</h3>
    <div><span class="temp-display" id="modalTemp">104</span><span class="temp-unit">°</span></div>
    <div class="temp-controls">
      <button class="temp-btn" onclick="adjustTemp(-1)">−</button>
      <button class="temp-btn" onclick="adjustTemp(1)">+</button>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeSetpoint()">Cancel</button>
      <button class="modal-btn confirm" onclick="confirmSetpoint()">Set</button>
    </div>
  </div>
</div>

<script>
const API = '';  // same origin
let state = null;
let ws = null;
let modalBody = null;
let modalValue = 0;

// ── API calls ──────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method };
  if (body) { opts.headers = {'Content-Type':'application/json'}; opts.body = JSON.stringify(body); }
  const r = await fetch(API + path, opts);
  return r.json();
}

async function refresh() {
  try {
    state = await api('GET', '/api/pool');
    render();
    document.getElementById('statusDot').classList.remove('disconnected');
  } catch(e) {
    document.getElementById('statusDot').classList.add('disconnected');
  }
}

// ── WebSocket ──────────────────────────────────────────────
function connectWs() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/api/ws');
  ws.onmessage = () => refresh();
  ws.onclose = () => setTimeout(connectWs, 3000);
}

// ── Render ─────────────────────────────────────────────────
function render() {
  if (!state) return;
  const u = state.system.temp_unit || '°F';
  const deg = u.includes('C') ? '°C' : '°F';

  // Air
  document.getElementById('airTemp').textContent = state.system.air_temperature + deg + ' air';

  // Pool
  const pool = state.pool;
  if (pool) {
    document.getElementById('poolTemp').textContent = pool.temperature + '°';
    document.getElementById('poolSet').textContent = 'set ' + pool.setpoint + '°';
    document.getElementById('poolShape').classList.toggle('active', pool.on);
    const ph = document.getElementById('poolHeat');
    ph.classList.toggle('active', pool.heating !== 'off');
  }

  // Spa
  const spa = state.spa;
  if (spa) {
    document.getElementById('spaTemp').textContent = spa.temperature + '°';
    document.getElementById('spaSet').textContent = 'set ' + spa.setpoint + '°';
    document.getElementById('spaShape').classList.toggle('active', spa.on);
    const sh = document.getElementById('spaHeat');
    sh.classList.toggle('active', spa.heating !== 'off');
    // Jets
    const jetsBtn = document.getElementById('jetsBtn');
    const hasJets = spa.accessories && spa.accessories.jets !== undefined;
    jetsBtn.classList.toggle('visible', hasJets);
    if (hasJets) {
      jetsBtn.classList.toggle('active', spa.accessories.jets);
    }
  }

  // Lights
  const lights = state.lights;
  if (lights) {
    const badge = document.getElementById('lightsBadge');
    badge.classList.toggle('active', lights.on);
    const label = lights.mode && lights.on ? lights.mode : (lights.on ? 'on' : 'off');
    document.getElementById('lightsLabel').textContent = label.charAt(0).toUpperCase() + label.slice(1);

    // Build mode buttons
    const container = document.getElementById('lightModes');
    if (container.children.length === 0 && lights.available_modes) {
      lights.available_modes.filter(m => m !== 'on' && m !== 'off' && m !== 'set' && m !== 'sync').forEach(mode => {
        const btn = document.createElement('button');
        btn.className = 'light-mode-btn';
        btn.textContent = mode.charAt(0).toUpperCase() + mode.slice(1);
        btn.onclick = () => setLightMode(mode);
        btn.dataset.mode = mode;
        container.appendChild(btn);
      });
    }
    // Highlight active mode
    container.querySelectorAll('.light-mode-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === lights.mode);
    });
  }

  // Auxiliaries
  const auxRow = document.getElementById('auxRow');
  if (state.auxiliaries && auxRow.children.length === 0) {
    state.auxiliaries.forEach(aux => {
      const btn = document.createElement('button');
      btn.className = 'aux-btn';
      btn.id = 'aux-' + aux.id;
      btn.textContent = aux.name;
      btn.onclick = () => toggleAux(aux.id);
      auxRow.appendChild(btn);
    });
  }
  if (state.auxiliaries) {
    state.auxiliaries.forEach(aux => {
      const btn = document.getElementById('aux-' + aux.id);
      if (btn) btn.classList.toggle('active', aux.on);
    });
  }

  // Pump
  const pump = state.pump;
  if (pump) {
    document.getElementById('pumpType').textContent = pump.pump_type;
    document.getElementById('pumpRpm').textContent = pump.running ? pump.rpm : '0';
    document.getElementById('pumpWatts').textContent = pump.running ? pump.watts : '0';
    document.getElementById('pumpGpm').textContent = pump.running ? pump.gpm : '0';
  }
}

// ── Actions ────────────────────────────────────────────────
async function togglePool() {
  if (!state?.pool) return;
  await api('POST', state.pool.on ? '/api/pool/off' : '/api/pool/on');
  setTimeout(refresh, 1000);
}

async function toggleSpa() {
  if (!state?.spa) return;
  await api('POST', state.spa.on ? '/api/spa/off' : '/api/spa/on');
  setTimeout(refresh, 1000);
}

async function toggleJets() {
  if (!state?.spa?.accessories) return;
  const on = state.spa.accessories.jets;
  await api('POST', on ? '/api/spa/jets/off' : '/api/spa/jets/on');
  setTimeout(refresh, 1500);
}

function toggleLightPicker() {
  const picker = document.getElementById('lightPicker');
  picker.classList.toggle('open');
}

async function setLightMode(mode) {
  await api('POST', '/api/lights/mode', { mode });
  if (!state.lights.on) {
    await api('POST', '/api/lights/on');
  }
  setTimeout(refresh, 500);
}

async function toggleAux(id) {
  const aux = state.auxiliaries.find(a => a.id === id);
  if (!aux) return;
  await api('POST', '/api/auxiliary/' + id + '/' + (aux.on ? 'off' : 'on'));
  setTimeout(refresh, 1000);
}

// ── Setpoint modal ─────────────────────────────────────────
function openSetpoint(body) {
  modalBody = body;
  const data = body === 'pool' ? state.pool : state.spa;
  if (!data) return;
  modalValue = data.setpoint;
  document.getElementById('modalTitle').textContent = (body === 'pool' ? 'Pool' : 'Spa') + ' Temperature';
  document.getElementById('modalTemp').textContent = modalValue;
  document.getElementById('setpointModal').classList.add('open');
}

function closeSetpoint() {
  document.getElementById('setpointModal').classList.remove('open');
  modalBody = null;
}

function adjustTemp(delta) {
  modalValue = Math.max(40, Math.min(104, modalValue + delta));
  document.getElementById('modalTemp').textContent = modalValue;
}

async function confirmSetpoint() {
  if (!modalBody) return;
  await api('POST', '/api/' + modalBody + '/heat', { setpoint: modalValue });
  closeSetpoint();
  setTimeout(refresh, 2000);
}

// Close modal on overlay click
document.getElementById('setpointModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSetpoint();
});

// ── Init ───────────────────────────────────────────────────
refresh();
connectWs();
setInterval(refresh, 10000);
</script>
</body>
</html>
