<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pool</title>
<style>
:root {
  --bg: #0f172a;
  --card: rgba(30, 41, 59, 0.8);
  --card-active: rgba(30, 58, 90, 0.9);
  --accent: #38bdf8;
  --warm: #fb923c;
  --hot: #ef4444;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-bright: #f8fafc;
  --spa-glow: rgba(20, 184, 166, 0.4);
  --pool-glow: rgba(56, 189, 248, 0.3);
  --radius: 24px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 20% 0%, rgba(14,165,233,0.08) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 100%, rgba(20,184,166,0.06) 0%, transparent 60%);
  color: var(--text);
  min-height: 100%;
  padding: 0 0 env(safe-area-inset-bottom);
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ─────────────────────────────────────── */
.header {
  padding: 16px 20px 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.header-left { display: flex; align-items: center; gap: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
.dot.off { background: #ef4444; }
.header h1 { font-size: 17px; font-weight: 600; color: var(--text-bright); }
.air-temp { font-size: 13px; color: var(--text-dim); }

/* ── Cards ──────────────────────────────────────── */
.cards { padding: 8px 16px; display: flex; flex-direction: column; gap: 12px; }

.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.06);
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: ''; position: absolute; inset: 0;
  border-radius: var(--radius);
  opacity: 0; transition: opacity 0.4s;
  pointer-events: none;
}
.card.active { border-color: rgba(255,255,255,0.12); }

/* Body cards (pool/spa) */
.card-body { display: grid; grid-template-columns: 1fr auto; align-items: start; gap: 12px; }
.card-body .left { display: flex; flex-direction: column; gap: 2px; }
.card-body .right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

.card-title {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
}
.card-title .heat-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--warm); display: none;
}
.card-title .heat-dot.on { display: inline-block; animation: pulse 2s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.temp {
  font-size: 56px; font-weight: 700; color: var(--text-bright);
  line-height: 1; letter-spacing: -2px;
  font-variant-numeric: tabular-nums;
}
.temp .unit { font-size: 24px; font-weight: 400; color: var(--text-dim); }

.setpoint {
  font-size: 15px; color: var(--text-dim);
  cursor: pointer; padding: 4px 0;
  transition: color 0.2s;
}
.setpoint:active { color: var(--accent); }

.toggle {
  width: 52px; height: 30px; border-radius: 15px;
  background: rgba(255,255,255,0.1);
  border: none; cursor: pointer;
  position: relative; transition: background 0.3s;
  flex-shrink: 0;
}
.toggle::after {
  content: ''; position: absolute;
  top: 3px; left: 3px;
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(255,255,255,0.5);
  transition: transform 0.3s, background 0.3s;
}
.toggle.on { background: var(--accent); }
.toggle.on::after { transform: translateX(22px); background: white; }

/* Spa-specific: accessories row */
.accessories {
  display: flex; gap: 8px; margin-top: 12px;
  padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06);
}
.acc-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 20px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-dim); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.3s;
}
.acc-btn:active { transform: scale(0.95); }
.acc-btn.on {
  background: rgba(20, 184, 166, 0.2);
  border-color: rgba(20, 184, 166, 0.5);
  color: #2dd4bf;
}

/* Pool card glow when active */
.card.pool-card.active::before {
  background: linear-gradient(135deg, rgba(56,189,248,0.1), transparent);
  opacity: 1;
}
.card.spa-card.active::before {
  background: linear-gradient(135deg, rgba(20,184,166,0.12), transparent);
  opacity: 1;
}

/* ── Lights card ────────────────────────────────── */
.card.lights-card .card-body { grid-template-columns: 1fr auto; }
.color-grid {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.color-btn {
  padding: 8px 14px; border-radius: 16px;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.08);
  color: var(--text-dim); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.25s;
}
.color-btn:active { transform: scale(0.93); }
.color-btn.on {
  background: rgba(250, 204, 21, 0.15);
  border-color: rgba(250, 204, 21, 0.5);
  color: #fbbf24;
}
.mode-label {
  font-size: 15px; color: var(--text-dim);
  text-transform: capitalize;
}

/* ── Aux row ────────────────────────────────────── */
.aux-section {
  padding: 4px 16px 8px;
  display: flex; gap: 8px; flex-wrap: wrap;
}
.aux-pill {
  flex: 1; min-width: 90px;
  padding: 14px 12px; border-radius: 16px;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--text-dim); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.3s;
  text-align: center;
  backdrop-filter: blur(20px);
}
.aux-pill:active { transform: scale(0.96); }
.aux-pill.on {
  background: rgba(56, 189, 248, 0.12);
  border-color: rgba(56, 189, 248, 0.3);
  color: var(--accent);
}

/* ── Pump strip ─────────────────────────────────── */
.pump-strip {
  margin: 8px 16px 16px;
  padding: 10px 16px;
  border-radius: 12px;
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid rgba(255,255,255,0.04);
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--text-dim);
}
.pump-strip .v { color: var(--text); font-weight: 600; }
.pump-strip.off { opacity: 0.4; }

/* ── Setpoint modal ─────────────────────────────── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  z-index: 100; align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }

.sheet {
  background: #1e293b; width: 100%; max-width: 420px;
  border-radius: 28px 28px 0 0;
  padding: 12px 24px calc(24px + env(safe-area-inset-bottom));
  text-align: center;
}
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.2);
  margin: 0 auto 20px;
}
.sheet h3 { font-size: 17px; font-weight: 600; color: var(--text-bright); margin-bottom: 24px; }
.sheet .big-temp {
  font-size: 72px; font-weight: 700; color: var(--text-bright);
  letter-spacing: -3px; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.sheet .big-unit { font-size: 28px; color: var(--text-dim); font-weight: 400; }
.sheet .temp-btns {
  display: flex; justify-content: center; gap: 32px;
  margin: 24px 0 28px;
}
.sheet .tbtn {
  width: 60px; height: 60px; border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--text-bright); font-size: 28px; font-weight: 300;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.sheet .tbtn:active { transform: scale(0.9); background: rgba(255,255,255,0.15); }
.sheet .actions { display: flex; gap: 12px; }
.sheet .btn {
  flex: 1; padding: 16px; border-radius: 14px; border: none;
  font-size: 16px; font-weight: 600; cursor: pointer;
}
.sheet .btn-cancel { background: rgba(255,255,255,0.08); color: var(--text); }
.sheet .btn-set { background: var(--accent); color: #0f172a; }
.sheet .btn:active { transform: scale(0.97); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="dot" id="dot"></div>
    <h1>Pool</h1>
  </div>
  <span class="air-temp" id="air"></span>
</div>

<div class="cards">
  <!-- Spa card -->
  <div class="card spa-card" id="spaCard">
    <div class="card-body">
      <div class="left">
        <div class="card-title">Spa <span class="heat-dot" id="spaHeatDot"></span></div>
        <div class="temp" id="spaTemp">--<span class="unit">°</span></div>
        <div class="setpoint" id="spaSet" onclick="openSet('spa')">Set --°</div>
      </div>
      <div class="right">
        <button class="toggle" id="spaToggle" onclick="toggleSpa()"></button>
      </div>
    </div>
    <div class="accessories" id="spaAcc"></div>
  </div>

  <!-- Pool card -->
  <div class="card pool-card" id="poolCard">
    <div class="card-body">
      <div class="left">
        <div class="card-title">Pool <span class="heat-dot" id="poolHeatDot"></span></div>
        <div class="temp" id="poolTemp">--<span class="unit">°</span></div>
        <div class="setpoint" id="poolSet" onclick="openSet('pool')">Set --°</div>
      </div>
      <div class="right">
        <button class="toggle" id="poolToggle" onclick="togglePool()"></button>
      </div>
    </div>
  </div>

  <!-- Lights card -->
  <div class="card lights-card" id="lightsCard">
    <div class="card-body">
      <div class="left">
        <div class="card-title">Lights</div>
        <div class="mode-label" id="lightMode">Off</div>
      </div>
      <div class="right">
        <button class="toggle" id="lightToggle" onclick="toggleLights()"></button>
      </div>
    </div>
    <div class="color-grid" id="colorGrid"></div>
  </div>
</div>

<div class="aux-section" id="auxSection"></div>

<div class="pump-strip" id="pumpStrip">
  <span>Pump <span class="v" id="pType">--</span></span>
  <span><span class="v" id="pRpm">0</span> RPM</span>
  <span><span class="v" id="pW">0</span>W</span>
  <span><span class="v" id="pGpm">0</span> GPM</span>
</div>

<!-- Bottom sheet setpoint picker -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeSet()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 id="sheetTitle">Spa Temperature</h3>
    <div><span class="big-temp" id="sheetTemp">104</span><span class="big-unit">°</span></div>
    <div class="temp-btns">
      <button class="tbtn" onclick="adj(-1)">−</button>
      <button class="tbtn" onclick="adj(+1)">+</button>
    </div>
    <div class="actions">
      <button class="btn btn-cancel" onclick="closeSet()">Cancel</button>
      <button class="btn btn-set" onclick="confirmSet()">Set</button>
    </div>
  </div>
</div>

<script>
const API = '';
let S = null;        // state
let setBody = null;  // which body the sheet is editing
let setVal = 0;

async function post(path, body) {
  const o = { method: 'POST' };
  if (body) { o.headers = {'Content-Type':'application/json'}; o.body = JSON.stringify(body); }
  return (await fetch(API + path, o)).json();
}

async function refresh() {
  try {
    S = await (await fetch(API + '/api/pool')).json();
    render();
    document.getElementById('dot').classList.remove('off');
  } catch { document.getElementById('dot').classList.add('off'); }
}

function connectWs() {
  const p = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(p + '//' + location.host + '/api/ws');
  ws.onmessage = () => refresh();
  ws.onclose = () => setTimeout(connectWs, 3000);
}

function render() {
  if (!S) return;
  const u = S.system.temp_unit?.includes('C') ? '°C' : '°F';

  // Air
  document.getElementById('air').textContent = S.system.air_temperature + u;

  // Spa
  if (S.spa) {
    document.getElementById('spaTemp').innerHTML = S.spa.temperature + '<span class="unit">°</span>';
    document.getElementById('spaSet').textContent = 'Set ' + S.spa.setpoint + '°';
    const st = document.getElementById('spaToggle');
    st.classList.toggle('on', S.spa.on);
    document.getElementById('spaCard').classList.toggle('active', S.spa.on);
    const hd = document.getElementById('spaHeatDot');
    hd.classList.toggle('on', S.spa.heating !== 'off');

    // Accessories
    const acc = document.getElementById('spaAcc');
    if (S.spa.accessories && Object.keys(S.spa.accessories).length > 0) {
      acc.style.display = '';
      if (acc.children.length === 0) {
        for (const [id, on] of Object.entries(S.spa.accessories)) {
          const b = document.createElement('button');
          b.className = 'acc-btn';
          b.id = 'acc-' + id;
          b.textContent = id.charAt(0).toUpperCase() + id.slice(1).replace(/_/g, ' ');
          b.onclick = () => toggleAcc(id);
          acc.appendChild(b);
        }
      }
      for (const [id, on] of Object.entries(S.spa.accessories)) {
        const b = document.getElementById('acc-' + id);
        if (b) b.classList.toggle('on', on);
      }
    } else {
      acc.style.display = 'none';
    }
  }

  // Pool
  if (S.pool) {
    document.getElementById('poolTemp').innerHTML = S.pool.temperature + '<span class="unit">°</span>';
    document.getElementById('poolSet').textContent = 'Set ' + S.pool.setpoint + '°';
    document.getElementById('poolToggle').classList.toggle('on', S.pool.on);
    document.getElementById('poolCard').classList.toggle('active', S.pool.on);
    document.getElementById('poolHeatDot').classList.toggle('on', S.pool.heating !== 'off');
  }

  // Lights
  if (S.lights) {
    document.getElementById('lightToggle').classList.toggle('on', S.lights.on);
    document.getElementById('lightsCard').classList.toggle('active', S.lights.on);
    const ml = document.getElementById('lightMode');
    ml.textContent = S.lights.on ? (S.lights.mode || 'On') : 'Off';
    ml.style.textTransform = 'capitalize';

    const grid = document.getElementById('colorGrid');
    if (grid.children.length === 0 && S.lights.available_modes) {
      for (const m of S.lights.available_modes.filter(m => !['off','on','set','sync','save','recall'].includes(m))) {
        const b = document.createElement('button');
        b.className = 'color-btn';
        b.dataset.mode = m;
        b.textContent = m.charAt(0).toUpperCase() + m.slice(1);
        b.onclick = () => setMode(m);
        grid.appendChild(b);
      }
    }
    grid.querySelectorAll('.color-btn').forEach(b => {
      b.classList.toggle('on', b.dataset.mode === S.lights.mode);
    });
  }

  // Aux
  const sec = document.getElementById('auxSection');
  if (S.auxiliaries) {
    if (sec.children.length === 0) {
      for (const a of S.auxiliaries) {
        const b = document.createElement('button');
        b.className = 'aux-pill';
        b.id = 'aux-' + a.id;
        b.textContent = a.name;
        b.onclick = () => toggleAux(a.id);
        sec.appendChild(b);
      }
    }
    for (const a of S.auxiliaries) {
      const b = document.getElementById('aux-' + a.id);
      if (b) b.classList.toggle('on', a.on);
    }
  }

  // Pump
  if (S.pump) {
    const strip = document.getElementById('pumpStrip');
    strip.classList.toggle('off', !S.pump.running);
    document.getElementById('pType').textContent = S.pump.pump_type;
    document.getElementById('pRpm').textContent = S.pump.running ? S.pump.rpm : '—';
    document.getElementById('pW').textContent = S.pump.running ? S.pump.watts : '—';
    document.getElementById('pGpm').textContent = S.pump.running ? S.pump.gpm : '—';
  }
}

// ── Actions ─────────────────────────────────────────
async function toggleSpa() {
  if (!S?.spa) return;
  await post(S.spa.on ? '/api/spa/off' : '/api/spa/on');
  setTimeout(refresh, 1500);
}
async function togglePool() {
  if (!S?.pool) return;
  await post(S.pool.on ? '/api/pool/off' : '/api/pool/on');
  setTimeout(refresh, 1500);
}
async function toggleLights() {
  if (!S?.lights) return;
  await post(S.lights.on ? '/api/lights/off' : '/api/lights/on');
  setTimeout(refresh, 500);
}
async function setMode(m) {
  await post('/api/lights/mode', { mode: m });
  if (!S.lights.on) await post('/api/lights/on');
  setTimeout(refresh, 500);
}
async function toggleAcc(id) {
  const on = S.spa?.accessories?.[id];
  await post('/api/spa/' + id + '/' + (on ? 'off' : 'on'));
  setTimeout(refresh, 1500);
}
async function toggleAux(id) {
  const a = S.auxiliaries.find(x => x.id === id);
  if (!a) return;
  await post('/api/auxiliary/' + id + '/' + (a.on ? 'off' : 'on'));
  setTimeout(refresh, 1000);
}

// ── Setpoint sheet ──────────────────────────────────
function openSet(body) {
  setBody = body;
  const d = body === 'pool' ? S.pool : S.spa;
  if (!d) return;
  setVal = d.setpoint;
  document.getElementById('sheetTitle').textContent = (body === 'pool' ? 'Pool' : 'Spa') + ' Temperature';
  document.getElementById('sheetTemp').textContent = setVal;
  document.getElementById('overlay').classList.add('open');
}
function closeSet() { document.getElementById('overlay').classList.remove('open'); setBody = null; }
function adj(d) {
  setVal = Math.max(40, Math.min(104, setVal + d));
  document.getElementById('sheetTemp').textContent = setVal;
}
async function confirmSet() {
  if (!setBody) return;
  await post('/api/' + setBody + '/heat', { setpoint: setVal });
  closeSet();
  setTimeout(refresh, 2000);
}

// ── Init ────────────────────────────────────────────
refresh();
connectWs();
setInterval(refresh, 15000);
</script>
</body>
</html>
